name: macOS App

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'NoschenMac/**'
      - '.github/workflows/macos-app.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, test, and package Noschen.app
    runs-on: macos-15
    defaults:
      run:
        working-directory: NoschenMac
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run unit tests
        run: swift test

      - name: Assemble Noschen.app (release)
        run: bash Scripts/make-app.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/Noschen.app Noschen.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Noschen.app
          path: NoschenMac/Noschen.app.zip
          if-no-files-found: error
