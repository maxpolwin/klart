name: macOS App

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'KlartMac/**'
      - '.github/workflows/macos-app.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, test, and package Klart.app
    runs-on: macos-15
    defaults:
      run:
        working-directory: KlartMac
    env:
      # Developer ID signing/notarization activates automatically once the
      # secrets exist (see KlartMac/README.md → "Distributing to testers").
      # Without them the workflow ad-hoc signs, which is fine for CI checks
      # but NOT for handing builds to other people.
      HAVE_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAVE_NOTARY: ${{ secrets.NOTARY_APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run unit tests
        run: swift test

      - name: Import Developer ID certificate
        if: env.HAVE_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" build.keychain > /dev/null

      - name: Assemble Klart.app (release)
        env:
          SIGN_IDENTITY: ${{ env.HAVE_SIGNING == 'true' && secrets.MACOS_SIGN_IDENTITY || '-' }}
        run: bash Scripts/make-app.sh

      - name: Build installer DMG
        env:
          SIGN_IDENTITY: ${{ env.HAVE_SIGNING == 'true' && secrets.MACOS_SIGN_IDENTITY || '-' }}
        run: bash Scripts/make-dmg.sh

      - name: Notarize and staple DMG
        if: env.HAVE_SIGNING == 'true' && env.HAVE_NOTARY == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool submit dist/Klart.dmg \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple dist/Klart.dmg
          spctl --assess --type open --context context:primary-signature -v dist/Klart.dmg

      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/Klart.app Klart.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Klart.app
          path: KlartMac/Klart.app.zip
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Klart.dmg
          path: KlartMac/dist/Klart.dmg
          if-no-files-found: error
